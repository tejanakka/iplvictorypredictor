<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL Broadcast Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="page-overlay"></div>

<nav class="navbar navbar-dark navbar-expand-lg custom-nav px-4">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold fs-2" href="#">
            🏏 IPL Predictor
        </a>

        <span class="live-pill">
            LIVE MATCH ANALYTICS
        </span>

    </div>
</nav>

<div class="container-fluid mt-4">

    <div class="row g-4">

        <!-- LEFT PANEL -->
        <div class="col-lg-3">
            <div class="side-card">
                <h4>🔥 Match Insights</h4>
                <p>AI powered prediction engine for IPL matches.</p>
            </div>

            <div class="side-card">
                <h4>⭐ Fantasy Picks</h4>
                <p>Best players insights.</p>
            </div>

            <div class="side-card sponsor">
                <h4>🏆 Analytics</h4>
                <p>Model based predictions</p>
            </div>
        </div>

        <!-- CENTER -->
        <div class="col-lg-6">

            <div class="main-card">

                <div class="hero-title text-center">
                    <h1>IPL WIN PREDICTOR</h1>
                    <p>Live win probability engine</p>
                </div>

                <div class="row g-4 mt-3">

                    <!-- BATSMAN -->
                    <div class="col-md-6">
                        <label class="form-label">Batting Team</label>
                        <select id="batting_team" class="form-select custom-input">

                            <option>Mumbai Indians</option>
                            <option>Chennai Super Kings</option>
                            <option>Kolkata Knight Riders</option>
                            <option>Royal Challengers Bangalore</option>
                            <option>Sunrisers Hyderabad</option>
                            <option>Rajasthan Royals</option>
                            <option>Delhi Capitals</option>
                            <option>Kings XI Punjab</option>
                            <option>Deccan Chargers</option>
                            <option>Gujarat Lions</option>

                        </select>
                    </div>

                    <!-- BOWLING -->
                    <div class="col-md-6">
                        <label class="form-label">Bowling Team</label>
                        <select id="bowling_team" class="form-select custom-input">

                            <option>Mumbai Indians</option>
                            <option>Chennai Super Kings</option>
                            <option>Kolkata Knight Riders</option>
                            <option>Royal Challengers Bangalore</option>
                            <option>Sunrisers Hyderabad</option>
                            <option>Rajasthan Royals</option>
                            <option>Delhi Capitals</option>
                            <option>Kings XI Punjab</option>
                            <option>Deccan Chargers</option>
                            <option>Gujarat Lions</option>

                        </select>
                    </div>

                    <!-- CITY -->
                    <div class="col-md-12">
                        <label class="form-label">Host City</label>
                        <select id="city" class="form-select custom-input">

                            <option>Mumbai</option>
                            <option>Bangalore</option>
                            <option>Chennai</option>
                            <option>Delhi</option>
                            <option>Kolkata</option>
                            <option>Hyderabad</option>
                            <option>Pune</option>
                            <option>Sharjah</option>
                            <option>Abu Dhabi</option>
                            <option>Ahmedabad</option>
                            <option>Jaipur</option>
                            <option>Mohali</option>
                            <option>Visakhapatnam</option>
                            <option>Rajkot</option>
                            <option>Indore</option>
                            <option>Ranchi</option>
                            <option>Raipur</option>
                            <option>Kanpur</option>
                            <option>Durban</option>
                            <option>Cape Town</option>
                            <option>Centurion</option>
                            <option>Johannesburg</option>

                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Target</label>
                        <input id="target" type="number" class="form-control custom-input">
                    </div>

                    <div class="col-md-4">
                        <label>Score</label>
                        <input id="score" type="number" class="form-control custom-input">
                    </div>

                    <div class="col-md-4">
                        <label>Overs</label>
                        <input id="overs" type="number" step="0.1" class="form-control custom-input">
                    </div>

                    <div class="col-md-12">
                        <label>Wickets Fallen</label>
                        <input id="wickets" type="number" class="form-control custom-input">
                    </div>

                </div>

                <div class="text-center mt-5">
                    <button class="predict-btn" onclick="predict()">
                        <i class="fas fa-chart-line"></i>
                        Predict Probabilities
                    </button>
                </div>

                <!-- RESULT -->
                <div id="resultBox" class="result-box mt-5 d-none">

                    <h2 class="text-center mb-4">Match Probability</h2>

                    <div class="team-card">
                        <div class="d-flex justify-content-between">
                            <h5 id="battingText"></h5>
                            <h5 id="battingPercent"></h5>
                        </div>
                        <div class="progress">
                            <div id="battingBar" class="progress-bar bg-success"></div>
                        </div>
                    </div>

                    <div class="team-card mt-4">
                        <div class="d-flex justify-content-between">
                            <h5 id="bowlingText"></h5>
                            <h5 id="bowlingPercent"></h5>
                        </div>
                        <div class="progress">
                            <div id="bowlingBar" class="progress-bar bg-danger"></div>
                        </div>
                    </div>

                </div>

            </div>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-3">
            <div class="side-card">
                <h4>📈 Stats</h4>
                <p>Live cricket analytics</p>
            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
